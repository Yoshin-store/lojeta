<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Loja Verde</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial; }
    body { background: #0a0a0a; color: white; }

    header {
      background: #16a34a;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .banner {
      background: linear-gradient(90deg, #14532d, #22c55e);
      padding: 60px;
      text-align: center;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .card {
      background: #18181b;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      background: #22c55e;
      color: white;
      border: none;
      padding: 10px 20px;
      margin-top: 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #18181b;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 400px;
    }

    .qr {
      width: 200px;
      margin-top: 20px;
      display: none;
    }
  </style>
</head>
<body>

<header>
  Minha Loja Verde
</header>

<section class="banner">
  <h1>Bem-vindo à Loja</h1>
  <p>Compre via Pix ou Cartão</p>
</section>

<section class="products">
  <div class="card">
    <img src="https://via.placeholder.com/300" alt="produto">
    <h2>Produto 1</h2>
    <p>R$ 50,00</p>
    <button onclick="openPayment('Produto 1', 50)">Comprar</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300" alt="produto">
    <h2>Produto 2</h2>
    <p>R$ 100,00</p>
    <button onclick="openPayment('Produto 2', 100)">Comprar</button>
  </div>
</section>

<div class="modal" id="paymentModal">
  <div class="modal-content">
    <h2>Pagamento</h2>
    <p id="productInfo"></p>

    <button onclick="showPix()">Pix</button>
    <button onclick="alert('Integre Mercado Pago ou Stripe aqui')">Cartão</button>

    <div>
      <img id="pixQr" class="qr" src="qrcode-pix.png" alt="QR Code Pix">
    </div>

    <br>
    <button onclick="closeModal()">Fechar</button>
  </div>
</div>

<script>
  let currentPrice = 0;

  function openPayment(product, price) {
    currentPrice = price;
    document.getElementById('paymentModal').style.display = 'flex';
    document.getElementById('productInfo').innerText = `${product} - R$ ${price.toFixed(2)}`;
    document.getElementById('pixQr').style.display = 'none';
  }

  function showPix() {
    document.getElementById('pixQr').style.display = 'block';
    alert(`Escaneie o QR Code para pagar R$ ${currentPrice.toFixed(2)}`);
  }

  function closeModal() {
    document.getElementById('paymentModal').style.display = 'none';
  }
</script>

</body>
</html>
